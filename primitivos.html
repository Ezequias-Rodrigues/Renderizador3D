<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primitivos 3D — Renderizador 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">&#9650; Renderizador 3D</a>
  <a href="wireframe.html">Wireframe OBJ</a>
  <a href="primitivos.html" class="active">Primitivos</a>
  <a href="iluminacao.html">Iluminação</a>
  <a href="particulas.html">Partículas</a>
  <a href="animacao.html">Animação</a>
</nav>

<div class="panel" style="top:62px; left:16px; width:220px;">
  <h3>Primitivo</h3>

  <label>Forma</label>
  <select id="shapeSelect">
    <option value="cube">Cubo</option>
    <option value="sphere">Esfera</option>
    <option value="pyramid">Pirâmide</option>
    <option value="torus">Torus</option>
    <option value="cylinder">Cilindro</option>
    <option value="octahedron">Octaedro</option>
  </select>

  <label>Subdivisões: <span id="subVal">16</span></label>
  <input type="range" id="subDiv" min="3" max="32" step="1" value="16">

  <label>Modo de exibição</label>
  <select id="displayMode">
    <option value="wireframe">Wireframe</option>
    <option value="solid">Sólido</option>
    <option value="both">Wireframe + Sólido</option>
  </select>

  <label>Cor</label>
  <input type="color" id="shapeColor" value="#7c3aed">

  <label>Zoom: <span id="zoomVal">1.0</span>x</label>
  <input type="range" id="zoomSlider" min="0.2" max="4" step="0.05" value="1">

  <button id="autoRotBtn" class="secondary">&#9654; Auto-rotação</button>
  <button id="resetBtn">&#8635; Resetar câmera</button>
</div>

<div class="stats">
  Vértices: <span id="statVerts">0</span><br>
  Faces: <span id="statFaces">0</span><br>
  FPS: <span id="statFps">0</span>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="badge">Arraste para rotacionar &nbsp;|&nbsp; Scroll para zoom</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}
resize();
window.addEventListener("resize", resize);

let vertices = [], faces = [];
let rotX = 0.4, rotY = 0.6;
let zoom = 1;
let dragging = false, lastX = 0, lastY = 0;
let autoRotate = false;
let fps = 0, lastTime = performance.now(), frameCount = 0;

const shapeSelect  = document.getElementById("shapeSelect");
const subDivEl     = document.getElementById("subDiv");
const subValEl     = document.getElementById("subVal");
const displayMode  = document.getElementById("displayMode");
const shapeColor   = document.getElementById("shapeColor");
const zoomSlider   = document.getElementById("zoomSlider");
const zoomVal      = document.getElementById("zoomVal");
const autoRotBtn   = document.getElementById("autoRotBtn");
const resetBtn     = document.getElementById("resetBtn");

shapeSelect.addEventListener("change", rebuild);
subDivEl.addEventListener("input", () => { subValEl.textContent = subDivEl.value; rebuild(); });
displayMode.addEventListener("change", () => {});
shapeColor.addEventListener("change", () => {});
zoomSlider.addEventListener("input", () => {
  zoom = parseFloat(zoomSlider.value);
  zoomVal.textContent = zoom.toFixed(2);
});
autoRotBtn.addEventListener("click", () => {
  autoRotate = !autoRotate;
  autoRotBtn.textContent = autoRotate ? "⏹ Parar rotação" : "▶ Auto-rotação";
  autoRotBtn.style.background = autoRotate ? "var(--accent)" : "";
  autoRotBtn.style.color = autoRotate ? "#fff" : "";
});
resetBtn.addEventListener("click", () => {
  rotX = 0.4; rotY = 0.6; zoom = 1;
  zoomSlider.value = 1; zoomVal.textContent = "1.00";
});

canvas.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("mouseup", () => { dragging = false; });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  rotY += (e.clientX - lastX) * 0.01;
  rotX += (e.clientY - lastY) * 0.01;
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(0.2, Math.min(4, zoom));
  zoomSlider.value = zoom; zoomVal.textContent = zoom.toFixed(2);
}, { passive: false });

// ===== GEOMETRY GENERATORS =====

function makeCube() {
  const s = 1;
  const v = [
    {x:-s,y:-s,z:-s},{x: s,y:-s,z:-s},{x: s,y: s,z:-s},{x:-s,y: s,z:-s},
    {x:-s,y:-s,z: s},{x: s,y:-s,z: s},{x: s,y: s,z: s},{x:-s,y: s,z: s}
  ];
  const f = [
    [0,1,2,3],[4,5,6,7],[0,1,5,4],
    [2,3,7,6],[0,3,7,4],[1,2,6,5]
  ];
  return { v, f };
}

function makeSphere(segs) {
  const v = [], f = [];
  for (let lat = 0; lat <= segs; lat++) {
    const theta = lat * Math.PI / segs;
    for (let lon = 0; lon <= segs; lon++) {
      const phi = lon * 2 * Math.PI / segs;
      v.push({
        x: Math.sin(theta) * Math.cos(phi),
        y: Math.cos(theta),
        z: Math.sin(theta) * Math.sin(phi)
      });
    }
  }
  for (let lat = 0; lat < segs; lat++) {
    for (let lon = 0; lon < segs; lon++) {
      const a = lat * (segs+1) + lon;
      const b = a + segs + 1;
      f.push([a, b, b+1, a+1]);
    }
  }
  return { v, f };
}

function makePyramid(segs) {
  const v = [], f = [];
  v.push({ x:0, y:1, z:0 });  // apex
  v.push({ x:0, y:-1, z:0 }); // base center
  for (let i = 0; i < segs; i++) {
    const a = i * 2 * Math.PI / segs;
    v.push({ x: Math.cos(a), y: -1, z: Math.sin(a) });
  }
  for (let i = 0; i < segs; i++) {
    const next = (i+1) % segs;
    f.push([0, i+2, next+2]);
    f.push([1, next+2, i+2]);
  }
  return { v, f };
}

function makeTorus(segs, tubeSegs) {
  const R = 0.7, r = 0.3;
  const v = [], f = [];
  for (let i = 0; i <= segs; i++) {
    const u = i * 2 * Math.PI / segs;
    for (let j = 0; j <= tubeSegs; j++) {
      const vv = j * 2 * Math.PI / tubeSegs;
      v.push({
        x: (R + r*Math.cos(vv)) * Math.cos(u),
        y: r * Math.sin(vv),
        z: (R + r*Math.cos(vv)) * Math.sin(u)
      });
    }
  }
  for (let i = 0; i < segs; i++) {
    for (let j = 0; j < tubeSegs; j++) {
      const a = i*(tubeSegs+1)+j;
      const b = a + tubeSegs + 1;
      f.push([a, b, b+1, a+1]);
    }
  }
  return { v, f };
}

function makeCylinder(segs) {
  const v = [], f = [];
  v.push({ x:0, y:1, z:0 });
  v.push({ x:0, y:-1, z:0 });
  for (let i = 0; i < segs; i++) {
    const a = i * 2 * Math.PI / segs;
    v.push({ x: Math.cos(a), y:  1, z: Math.sin(a) });
    v.push({ x: Math.cos(a), y: -1, z: Math.sin(a) });
  }
  for (let i = 0; i < segs; i++) {
    const ni = (i+1) % segs;
    const t0 = 2+i*2, t1 = 2+ni*2;
    const b0 = t0+1, b1 = t1+1;
    f.push([0, t0, t1]);
    f.push([1, b1, b0]);
    f.push([t0, b0, b1, t1]);
  }
  return { v, f };
}

function makeOctahedron() {
  const v = [
    {x:0,y:1,z:0},{x:0,y:-1,z:0},
    {x:1,y:0,z:0},{x:-1,y:0,z:0},
    {x:0,y:0,z:1},{x:0,y:0,z:-1}
  ];
  const f = [
    [0,2,4],[0,4,3],[0,3,5],[0,5,2],
    [1,4,2],[1,3,4],[1,5,3],[1,2,5]
  ];
  return { v, f };
}

function rebuild() {
  const shape = shapeSelect.value;
  const segs = parseInt(subDivEl.value);
  let geo;
  if (shape === "cube")       geo = makeCube();
  else if (shape === "sphere")    geo = makeSphere(segs);
  else if (shape === "pyramid")   geo = makePyramid(segs);
  else if (shape === "torus")     geo = makeTorus(segs, Math.max(4, Math.floor(segs/2)));
  else if (shape === "cylinder")  geo = makeCylinder(segs);
  else if (shape === "octahedron") geo = makeOctahedron();
  vertices = geo.v;
  faces = geo.f;
  document.getElementById("statVerts").textContent = vertices.length;
  document.getElementById("statFaces").textContent = faces.length;
}

// ===== MATH =====
function rotateVertex(v) {
  let { x, y, z } = v;
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 = x*cosY + z1*sinY, z2 = -x*sinY + z1*cosY;
  return { x: x1, y: y1, z: z2 };
}

function project(v) {
  const d = 4, s = d/(d-v.z)*300*zoom;
  return { x: v.x*s + canvas.width/2, y: -v.y*s + canvas.height/2, z: v.z };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function faceNormal(pts) {
  if (pts.length < 3) return { x:0, y:0, z:1 };
  const a = pts[0], b = pts[1], c = pts[2];
  const ux = b.x-a.x, uy = b.y-a.y, uz = b.z-a.z;
  const vx = c.x-a.x, vy = c.y-a.y, vz = c.z-a.z;
  return {
    x: uy*vz - uz*vy,
    y: uz*vx - ux*vz,
    z: ux*vy - uy*vx
  };
}

function dotNormalized(n, l) {
  const nl = Math.sqrt(n.x*n.x+n.y*n.y+n.z*n.z);
  const ll = Math.sqrt(l.x*l.x+l.y*l.y+l.z*l.z);
  if (nl===0||ll===0) return 0;
  return (n.x*l.x+n.y*l.y+n.z*l.z)/(nl*ll);
}

// ===== RENDER =====
function render(ts) {
  frameCount++;
  if (ts - lastTime >= 1000) {
    fps = frameCount; frameCount = 0; lastTime = ts;
    document.getElementById("statFps").textContent = fps;
  }

  if (autoRotate) { rotY += 0.01; rotX += 0.003; }

  ctx.fillStyle = "#0d0d0f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const mode = displayMode.value;
  const col = hexToRgb(shapeColor.value);
  const light = { x: 0.5, y: 1, z: 0.8 };

  const rotated = vertices.map(v => rotateVertex(v));
  const projected = rotated.map(v => project(v));

  // Sort faces by average Z (painter's algorithm)
  const sortedFaces = faces.map((face, i) => {
    let avgZ = 0;
    for (const idx of face) avgZ += rotated[idx].z;
    return { face, avgZ: avgZ / face.length };
  }).sort((a, b) => a.avgZ - b.avgZ);

  for (const { face } of sortedFaces) {
    const pts3d = face.map(i => rotated[i]);
    const pts2d = face.map(i => projected[i]);

    if (mode === "solid" || mode === "both") {
      const n = faceNormal(pts3d);
      const diff = Math.max(0, dotNormalized(n, light));
      const ambient = 0.2;
      const intensity = ambient + diff * 0.8;
      const r = Math.round(col.r * intensity);
      const g = Math.round(col.g * intensity);
      const b = Math.round(col.b * intensity);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      pts2d.forEach((p, i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
      ctx.closePath();
      ctx.fill();
    }

    if (mode === "wireframe" || mode === "both") {
      ctx.strokeStyle = mode === "both"
        ? `rgba(${col.r},${col.g},${col.b},0.5)`
        : shapeColor.value;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      pts2d.forEach((p, i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
      ctx.closePath();
      ctx.stroke();
    }
  }

  requestAnimationFrame(render);
}

rebuild();
requestAnimationFrame(render);
</script>
</body>
</html>
