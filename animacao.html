<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animação — Renderizador 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">&#9650; Renderizador 3D</a>
  <a href="wireframe.html">Wireframe OBJ</a>
  <a href="primitivos.html">Primitivos</a>
  <a href="iluminacao.html">Iluminação</a>
  <a href="particulas.html">Partículas</a>
  <a href="animacao.html" class="active">Animação</a>
</nav>

<div class="panel" style="top:62px; left:16px; width:220px;">
  <h3>Cena</h3>

  <label>Cena</label>
  <select id="sceneSelect">
    <option value="solar">Sistema Solar</option>
    <option value="dna">Hélice de DNA</option>
    <option value="cubes">Cubos em Órbita</option>
    <option value="wave">Onda de Esferas</option>
    <option value="clock">Relógio 3D</option>
  </select>

  <label>Velocidade: <span id="speedVal">1.0</span>x</label>
  <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">

  <label>Zoom: <span id="zoomVal">1.0</span>x</label>
  <input type="range" id="zoomSlider" min="0.3" max="3" step="0.05" value="1">

  <label>Modo de exibição</label>
  <select id="displayMode">
    <option value="solid">Sólido</option>
    <option value="wireframe">Wireframe</option>
    <option value="both">Ambos</option>
  </select>

  <label>Fundo</label>
  <select id="bgSelect">
    <option value="dark">Escuro</option>
    <option value="stars">Estrelas</option>
    <option value="grid">Grade</option>
  </select>

  <button id="pauseBtn" class="secondary">&#9646;&#9646; Pausar</button>
  <button id="resetBtn">&#8635; Reiniciar</button>
</div>

<div class="stats">
  Objetos: <span id="statObjs">0</span><br>
  FPS: <span id="statFps">0</span>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="badge" id="badge">Sistema Solar — Arraste para rotacionar</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}
resize();
window.addEventListener("resize", resize);

let rotX = 0.4, rotY = 0;
let dragging = false, lastX = 0, lastY = 0;
let fps = 0, lastTime = performance.now(), frameCount = 0;
let time = 0;
let paused = false;
let stars = [];

const sceneSelect  = document.getElementById("sceneSelect");
const speedSlider  = document.getElementById("speedSlider");
const zoomSlider   = document.getElementById("zoomSlider");
const displayMode  = document.getElementById("displayMode");
const bgSelect     = document.getElementById("bgSelect");
const pauseBtn     = document.getElementById("pauseBtn");
const resetBtn     = document.getElementById("resetBtn");

function bindSlider(el, spanId, dec=1) {
  el.addEventListener("input", () => {
    document.getElementById(spanId).textContent = parseFloat(el.value).toFixed(dec);
  });
}
bindSlider(speedSlider, "speedVal");
bindSlider(zoomSlider,  "zoomVal");

sceneSelect.addEventListener("change", () => {
  time = 0;
  document.getElementById("badge").textContent = sceneSelect.options[sceneSelect.selectedIndex].text + " — Arraste para rotacionar";
});

pauseBtn.addEventListener("click", () => {
  paused = !paused;
  pauseBtn.textContent = paused ? "▶ Continuar" : "⏸ Pausar";
  pauseBtn.style.background = paused ? "var(--accent)" : "";
  pauseBtn.style.color = paused ? "#fff" : "";
});

resetBtn.addEventListener("click", () => { time = 0; rotX = 0.4; rotY = 0; });

canvas.addEventListener("mousedown", e => { dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener("mouseup", () => { dragging=false; });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  rotY += (e.clientX-lastX)*0.01;
  rotX += (e.clientY-lastY)*0.01;
  lastX=e.clientX; lastY=e.clientY;
});
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  let z = parseFloat(zoomSlider.value);
  z *= e.deltaY > 0 ? 0.95 : 1.05;
  z = Math.max(0.3, Math.min(3, z));
  zoomSlider.value = z;
  document.getElementById("zoomVal").textContent = z.toFixed(2);
}, { passive: false });

// ===== MATH =====
function rotateVec(v) {
  let { x, y, z } = v;
  const cosX=Math.cos(rotX), sinX=Math.sin(rotX);
  let y1=y*cosX-z*sinX, z1=y*sinX+z*cosX;
  const cosY=Math.cos(rotY), sinY=Math.sin(rotY);
  let x1=x*cosY+z1*sinY, z2=-x*sinY+z1*cosY;
  return { x:x1, y:y1, z:z2 };
}

function project(v) {
  const zoom = parseFloat(zoomSlider.value);
  const d=5, s=d/(d-v.z)*280*zoom;
  return { x:v.x*s+canvas.width/2, y:-v.y*s+canvas.height/2, z:v.z };
}

function normalize(v) {
  const l=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z)||1;
  return {x:v.x/l,y:v.y/l,z:v.z/l};
}

function dot(a,b) { return a.x*b.x+a.y*b.y+a.z*b.z; }

// ===== GEOMETRY =====
function makeSphereGeo(segs) {
  const v=[], f=[];
  for (let lat=0; lat<=segs; lat++) {
    const theta=lat*Math.PI/segs;
    for (let lon=0; lon<=segs; lon++) {
      const phi=lon*2*Math.PI/segs;
      v.push({x:Math.sin(theta)*Math.cos(phi),y:Math.cos(theta),z:Math.sin(theta)*Math.sin(phi)});
    }
  }
  for (let lat=0; lat<segs; lat++) {
    for (let lon=0; lon<segs; lon++) {
      const a=lat*(segs+1)+lon, b=a+segs+1;
      f.push([a,b,b+1,a+1]);
    }
  }
  return {v,f};
}

function makeCubeGeo() {
  const s=1;
  return {
    v:[
      {x:-s,y:-s,z:-s},{x:s,y:-s,z:-s},{x:s,y:s,z:-s},{x:-s,y:s,z:-s},
      {x:-s,y:-s,z:s},{x:s,y:-s,z:s},{x:s,y:s,z:s},{x:-s,y:s,z:s}
    ],
    f:[[0,1,2,3],[7,6,5,4],[0,1,5,4],[3,2,6,7],[0,3,7,4],[1,2,6,5]]
  };
}

const sphereGeo = makeSphereGeo(10);
const cubeGeo   = makeCubeGeo();

// ===== DRAW OBJECT =====
function drawObject(geo, transform, color, alpha=1) {
  const mode = displayMode.value;
  const light = normalize({x:1,y:2,z:2});

  const verts = geo.v.map(v => {
    const sv = { x:v.x*transform.scale, y:v.y*transform.scale, z:v.z*transform.scale };
    // Local rotation
    if (transform.localRotY !== undefined) {
      const c=Math.cos(transform.localRotY), s=Math.sin(transform.localRotY);
      const x1=sv.x*c+sv.z*s, z1=-sv.x*s+sv.z*c;
      sv.x=x1; sv.z=z1;
    }
    if (transform.localRotX !== undefined) {
      const c=Math.cos(transform.localRotX), s=Math.sin(transform.localRotX);
      const y1=sv.y*c-sv.z*s, z1=sv.y*s+sv.z*c;
      sv.y=y1; sv.z=z1;
    }
    return {
      x: sv.x + transform.x,
      y: sv.y + transform.y,
      z: sv.z + transform.z
    };
  });

  const rotated   = verts.map(v => rotateVec(v));
  const projected = rotated.map(v => project(v));

  const sorted = geo.f.map(face => {
    let avgZ=0;
    for (const i of face) avgZ+=rotated[i].z;
    return { face, avgZ: avgZ/face.length };
  }).sort((a,b)=>a.avgZ-b.avgZ);

  const col = typeof color === "string" ? hexToRgb(color) : color;

  for (const { face } of sorted) {
    const pts3d = face.map(i=>rotated[i]);
    const pts2d = face.map(i=>projected[i]);

    if (mode==="solid"||mode==="both") {
      const n = computeFaceNormal(pts3d);
      const diff = Math.max(0, dot(n, light));
      const intensity = 0.2 + diff*0.8;
      ctx.fillStyle = `rgba(${Math.round(col.r*intensity)},${Math.round(col.g*intensity)},${Math.round(col.b*intensity)},${alpha})`;
      ctx.beginPath();
      pts2d.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.closePath();
      ctx.fill();
    }

    if (mode==="wireframe"||mode==="both") {
      ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha*0.6})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      pts2d.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function computeFaceNormal(pts) {
  if (pts.length<3) return {x:0,y:1,z:0};
  const a=pts[0],b=pts[1],c=pts[2];
  const ux=b.x-a.x,uy=b.y-a.y,uz=b.z-a.z;
  const vx=c.x-a.x,vy=c.y-a.y,vz=c.z-a.z;
  return normalize({x:uy*vz-uz*vy,y:uz*vx-ux*vz,z:ux*vy-uy*vx});
}

function hexToRgb(hex) {
  return {
    r:parseInt(hex.slice(1,3),16),
    g:parseInt(hex.slice(3,5),16),
    b:parseInt(hex.slice(5,7),16)
  };
}

// ===== SCENES =====
const solarSystem = [
  { name:"Sol",     r:0,    speed:0,     size:0.22, color:"#FFD700", tilt:0 },
  { name:"Mercúrio",r:0.45, speed:4.15,  size:0.04, color:"#aaa",    tilt:0.1 },
  { name:"Vênus",   r:0.60, speed:1.62,  size:0.06, color:"#e8a060", tilt:0.05 },
  { name:"Terra",   r:0.78, speed:1.00,  size:0.065,color:"#4488ff", tilt:0.41 },
  { name:"Marte",   r:0.98, speed:0.53,  size:0.05, color:"#cc4422", tilt:0.44 },
  { name:"Júpiter", r:1.35, speed:0.084, size:0.14, color:"#c8a060", tilt:0.05 },
  { name:"Saturno", r:1.70, speed:0.034, size:0.12, color:"#d4b060", tilt:0.47 },
  { name:"Urano",   r:2.00, speed:0.012, size:0.09, color:"#80d8ff", tilt:1.71 },
  { name:"Netuno",  r:2.30, speed:0.006, size:0.085,color:"#4466ff", tilt:0.49 },
];

function drawStars() {
  if (stars.length === 0) {
    for (let i=0; i<300; i++) {
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5,
        a: 0.3+Math.random()*0.7
      });
    }
  }
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  }
}

function drawGrid() {
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;
  const step = 60;
  for (let x=0; x<canvas.width; x+=step) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for (let y=0; y<canvas.height; y+=step) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function sceneSolar(t, speed) {
  document.getElementById("statObjs").textContent = solarSystem.length;

  // Draw orbit rings
  for (const planet of solarSystem) {
    if (planet.r === 0) continue;
    const pts = [];
    for (let i=0; i<=64; i++) {
      const a = i*2*Math.PI/64;
      const rv = rotateVec({x:Math.cos(a)*planet.r, y:0, z:Math.sin(a)*planet.r});
      pts.push(project(rv));
    }
    ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle="rgba(255,255,255,0.06)";
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // Draw planets
  for (const planet of solarSystem) {
    const angle = t * planet.speed * speed;
    const x = Math.cos(angle) * planet.r;
    const z = Math.sin(angle) * planet.r;
    drawObject(sphereGeo, {
      x, y:0, z,
      scale: planet.size,
      localRotY: angle * 2
    }, planet.color);

    // Saturn rings
    if (planet.name === "Saturno") {
      ctx.save();
      const center = project(rotateVec({x,y:0,z}));
      ctx.strokeStyle = "rgba(212,176,96,0.4)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(center.x, center.y, 28, 8, 0.3, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function sceneDNA(t, speed) {
  const count = 30;
  document.getElementById("statObjs").textContent = count*2;
  const colors = ["#00e5ff","#ff4081","#69ff47","#ffea00"];
  for (let i=0; i<count; i++) {
    const angle = (i/count)*Math.PI*6 + t*speed*0.5;
    const y = (i/count)*3 - 1.5;
    const r = 0.6;

    // Strand A
    drawObject(sphereGeo, {
      x: Math.cos(angle)*r, y, z: Math.sin(angle)*r,
      scale: 0.08
    }, colors[i%2]);

    // Strand B (opposite)
    drawObject(sphereGeo, {
      x: Math.cos(angle+Math.PI)*r, y, z: Math.sin(angle+Math.PI)*r,
      scale: 0.08
    }, colors[(i+2)%4]);

    // Rungs (every 3)
    if (i%3===0) {
      const ax = Math.cos(angle)*r, az = Math.sin(angle)*r;
      const bx = Math.cos(angle+Math.PI)*r, bz = Math.sin(angle+Math.PI)*r;
      const pa = project(rotateVec({x:ax,y,z:az}));
      const pb = project(rotateVec({x:bx,y,z:bz}));
      ctx.beginPath();
      ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle="rgba(255,255,255,0.2)";
      ctx.lineWidth=1;
      ctx.stroke();
    }
  }
}

function sceneCubes(t, speed) {
  const count = 8;
  document.getElementById("statObjs").textContent = count;
  const colors = ["#7c3aed","#06b6d4","#f59e0b","#ef4444","#22c55e","#ec4899","#8b5cf6","#14b8a6"];
  for (let i=0; i<count; i++) {
    const baseAngle = (i/count)*Math.PI*2;
    const angle = baseAngle + t*speed*0.3;
    const r = 1.0 + 0.3*Math.sin(t*speed*0.5+i);
    const y = 0.4*Math.sin(t*speed*0.7+i*1.3);
    drawObject(cubeGeo, {
      x: Math.cos(angle)*r, y, z: Math.sin(angle)*r,
      scale: 0.12,
      localRotY: t*speed*(0.5+i*0.1),
      localRotX: t*speed*(0.3+i*0.07)
    }, colors[i]);
  }

  // Central cube
  drawObject(cubeGeo, {
    x:0, y:0, z:0,
    scale: 0.25,
    localRotY: t*speed*0.4,
    localRotX: t*speed*0.2
  }, "#ffffff");
}

function sceneWave(t, speed) {
  const cols = 10, rows = 10;
  document.getElementById("statObjs").textContent = cols*rows;
  for (let i=0; i<cols; i++) {
    for (let j=0; j<rows; j++) {
      const x = (i/(cols-1)-0.5)*2.5;
      const z = (j/(rows-1)-0.5)*2.5;
      const dist = Math.sqrt(x*x+z*z);
      const y = 0.3*Math.sin(dist*4 - t*speed*2);
      const hue = (i*36+j*18+t*speed*20)%360;
      const col = `hsl(${hue},80%,60%)`;
      drawObject(sphereGeo, { x, y, z, scale:0.08 }, col);
    }
  }
}

function sceneClock(t, speed) {
  document.getElementById("statObjs").textContent = "12+3";

  // Clock face markers
  for (let i=0; i<12; i++) {
    const a = (i/12)*Math.PI*2 - Math.PI/2;
    const r = 1.2;
    drawObject(sphereGeo, {
      x: Math.cos(a)*r, y:0, z: Math.sin(a)*r,
      scale: i%3===0 ? 0.06 : 0.035
    }, i%3===0 ? "#ffffff" : "#888888");
  }

  // Hands
  const now = new Date();
  const secAngle  = (now.getSeconds()/60)*Math.PI*2 - Math.PI/2;
  const minAngle  = (now.getMinutes()/60)*Math.PI*2 - Math.PI/2;
  const hourAngle = (now.getHours()%12/12)*Math.PI*2 - Math.PI/2;

  function drawHand(angle, length, color, width) {
    const tip = project(rotateVec({x:Math.cos(angle)*length,y:0,z:Math.sin(angle)*length}));
    const base= project(rotateVec({x:0,y:0,z:0}));
    ctx.beginPath();
    ctx.moveTo(base.x,base.y);
    ctx.lineTo(tip.x,tip.y);
    ctx.strokeStyle=color;
    ctx.lineWidth=width;
    ctx.stroke();
  }

  drawHand(hourAngle, 0.7, "#ffffff", 4);
  drawHand(minAngle,  1.0, "#aaaaaa", 2.5);
  drawHand(secAngle,  1.15,"#ef4444", 1.5);

  // Center dot
  const c = project(rotateVec({x:0,y:0,z:0}));
  ctx.beginPath();
  ctx.arc(c.x,c.y,5,0,Math.PI*2);
  ctx.fillStyle="#ffffff";
  ctx.fill();
}

// ===== RENDER LOOP =====
function render(ts) {
  frameCount++;
  if (ts-lastTime>=1000) {
    fps=frameCount; frameCount=0; lastTime=ts;
    document.getElementById("statFps").textContent=fps;
  }

  const bg = bgSelect.value;
  ctx.fillStyle="#0d0d0f";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if (bg==="stars") drawStars();
  if (bg==="grid")  drawGrid();

  const speed = parseFloat(speedSlider.value);
  if (!paused) time += 0.016;

  const scene = sceneSelect.value;
  if (scene==="solar")  sceneSolar(time, speed);
  else if (scene==="dna")    sceneDNA(time, speed);
  else if (scene==="cubes")  sceneCubes(time, speed);
  else if (scene==="wave")   sceneWave(time, speed);
  else if (scene==="clock")  sceneClock(time, speed);

  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
